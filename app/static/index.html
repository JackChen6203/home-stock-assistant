<!doctype html>
<html lang="zh-Hant">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
	<meta name="theme-color" content="#f8faf7">
	<title>管家</title>
	<style>
		:root {
			color-scheme: light;
			--bg: #f7f8f2;
			--ink: #1b231d;
			--muted: #687266;
			--line: #dfe5d8;
			--panel: #ffffff;
			--soft: #eef4e8;
			--primary: #2f7d4f;
			--primary-ink: #ffffff;
			--warn: #8a5c00;
			--danger: #b42318;
			--radius: 24px;
		}

		* { box-sizing: border-box; }
		html, body { min-height: 100%; }
		body {
			margin: 0;
			background: var(--bg);
			color: var(--ink);
			font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans TC", "Segoe UI", sans-serif;
			-webkit-font-smoothing: antialiased;
		}

		button, input, select {
			font: inherit;
		}

		.app {
			min-height: 100dvh;
			max-width: 480px;
			margin: 0 auto;
			background: linear-gradient(180deg, #fbfcf8 0%, #f2f5ed 100%);
			position: relative;
			padding: max(18px, env(safe-area-inset-top)) 18px calc(88px + env(safe-area-inset-bottom));
		}

		.topbar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			margin-bottom: 18px;
		}

		.brand {
			display: grid;
			gap: 2px;
		}

		.brand strong {
			font-size: 28px;
			letter-spacing: 0;
		}

		.brand span {
			color: var(--muted);
			font-size: 13px;
		}

		.icon-button {
			width: 44px;
			height: 44px;
			border-radius: 50%;
			border: 1px solid var(--line);
			background: var(--panel);
			color: var(--ink);
			display: grid;
			place-items: center;
		}

		.hero-card, .sheet, .list-card {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: var(--radius);
			box-shadow: 0 18px 44px rgba(59, 72, 52, 0.08);
		}

		.hero-card {
			padding: 18px;
			display: grid;
			gap: 14px;
			margin-bottom: 16px;
		}

		.status-row {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.chip {
			border-radius: 999px;
			background: var(--soft);
			color: #35543e;
			padding: 7px 10px;
			font-size: 12px;
			font-weight: 700;
		}

		.quick-add {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 10px;
			align-items: end;
		}

		.field {
			display: grid;
			gap: 7px;
		}

		label {
			font-size: 12px;
			font-weight: 800;
			color: var(--muted);
		}

		input, select {
			width: 100%;
			min-height: 48px;
			border: 1px solid var(--line);
			border-radius: 16px;
			background: #fbfcfa;
			color: var(--ink);
			padding: 0 14px;
			outline: none;
		}

		input:focus, select:focus {
			border-color: #79b68b;
			box-shadow: 0 0 0 4px rgba(47, 125, 79, 0.12);
		}

		.primary, .secondary, .ghost {
			min-height: 48px;
			border: 0;
			border-radius: 16px;
			padding: 0 16px;
			font-weight: 800;
		}

		.primary {
			background: var(--primary);
			color: var(--primary-ink);
		}

		.secondary {
			background: #dcefe3;
			color: #174c2d;
		}

		.ghost {
			background: #f3f5ef;
			color: var(--ink);
			border: 1px solid var(--line);
		}

		.tabs {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			background: #e9eee2;
			border-radius: 18px;
			padding: 4px;
			margin: 12px 0 16px;
		}

		.tab {
			border: 0;
			border-radius: 14px;
			min-height: 40px;
			background: transparent;
			color: var(--muted);
			font-weight: 800;
		}

		.tab.active {
			background: var(--panel);
			color: var(--ink);
			box-shadow: 0 8px 20px rgba(70, 84, 61, 0.1);
		}

		.list-card {
			padding: 16px;
			display: grid;
			gap: 12px;
			margin-bottom: 16px;
		}

		.list-title {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
		}

		.list-title h2 {
			margin: 0;
			font-size: 18px;
		}

		.item {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			padding: 14px 0;
			border-top: 1px solid var(--line);
		}

		.item:first-child { border-top: 0; }
		.item strong { display: block; font-size: 16px; }
		.item span { color: var(--muted); font-size: 13px; }

		.empty, .message {
			color: var(--muted);
			line-height: 1.5;
			font-size: 14px;
		}

		.message {
			background: #fff8e8;
			border: 1px solid #f0dcae;
			color: var(--warn);
			border-radius: 16px;
			padding: 12px;
		}

		.message.error {
			background: #fff0ee;
			border-color: #ffd1cc;
			color: var(--danger);
		}

		.message.ok {
			background: #eef9f1;
			border-color: #c9ebd2;
			color: #27633f;
		}

		.sheet {
			padding: 16px;
			display: grid;
			gap: 12px;
		}

		.sheet h2 {
			margin: 0;
			font-size: 17px;
		}

		.form-grid {
			display: grid;
			gap: 10px;
		}

		.actions {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 10px;
		}

		.social-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 8px;
		}

		.social-grid button {
			min-height: 44px;
			border-radius: 14px;
			border: 1px solid var(--line);
			background: #fbfcfa;
			font-weight: 800;
		}

		.nav {
			position: fixed;
			left: 50%;
			bottom: 0;
			transform: translateX(-50%);
			width: min(480px, 100%);
			padding: 10px 18px calc(10px + env(safe-area-inset-bottom));
			background: rgba(251, 252, 248, 0.92);
			backdrop-filter: blur(18px);
			border-top: 1px solid var(--line);
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 8px;
		}

		.nav button {
			border: 0;
			border-radius: 16px;
			background: transparent;
			min-height: 48px;
			color: var(--muted);
			font-weight: 800;
		}

		.nav button.active {
			background: var(--soft);
			color: var(--primary);
		}

		.view { display: none; }
		.view.active { display: block; }
	</style>
</head>
<body>
	<main class="app">
		<header class="topbar">
			<div class="brand">
				<strong>管家</strong>
				<span>Home Stock Assistant</span>
			</div>
			<button class="icon-button" id="refreshBtn" type="button" aria-label="刷新">↻</button>
		</header>

		<section class="view active" id="homeView">
			<div class="hero-card">
				<div class="status-row">
					<span class="chip" id="authChip">未登入</span>
					<span class="chip" id="familyChip">未加入家庭</span>
					<span class="chip" id="apiChip">API 檢查中</span>
				</div>
				<div class="quick-add">
					<div class="field">
						<label for="itemNameInput">快速新增</label>
						<input id="itemNameInput" type="text" placeholder="例如：牛奶 2 個" autocomplete="off">
					</div>
					<button class="primary" id="quickAddBtn" type="button">加入</button>
				</div>
				<div class="field">
					<label for="listTypeInput">清單</label>
					<select id="listTypeInput">
						<option value="personal">個人</option>
						<option value="family">家用</option>
					</select>
				</div>
				<div class="message" id="statusBox">請先登入，之後可用 Siri 捷徑呼叫語音加入。</div>
			</div>

			<div class="tabs">
				<button class="tab active" id="personalTab" type="button">個人</button>
				<button class="tab" id="familyTab" type="button">家用</button>
			</div>

			<section class="list-card">
				<div class="list-title">
					<h2 id="listTitle">個人清單</h2>
					<button class="ghost" id="buyBtn" type="button">買好了</button>
				</div>
				<div id="currentList" class="empty">尚未載入。</div>
			</section>
		</section>

		<section class="view" id="voiceView">
			<div class="sheet">
				<h2>語音助手</h2>
				<div class="message ok">iOS 捷徑可以 POST 到 <strong>/voice/siri</strong>，Header 帶 Bearer token，Body 帶 phrase 與 list_type。</div>
				<div class="field">
					<label for="voiceInput">模擬 Siri 聽到的內容</label>
					<input id="voiceInput" type="text" placeholder="幫我在管家紀錄要買牛奶 2 個">
				</div>
				<button class="primary" id="voiceBtn" type="button">語音加入</button>
			</div>
		</section>

		<section class="view" id="accountView">
			<div class="sheet">
				<h2>登入</h2>
				<div class="social-grid">
					<button data-provider="apple" type="button">Apple</button>
					<button data-provider="line" type="button">LINE</button>
					<button data-provider="google" type="button">Google</button>
				</div>
				<div class="form-grid">
					<div class="field">
						<label for="nameInput">姓名</label>
						<input id="nameInput" type="text" placeholder="註冊用姓名">
					</div>
					<div class="field">
						<label for="emailInput">Email</label>
						<input id="emailInput" type="email" placeholder="you@example.com">
					</div>
					<div class="field">
						<label for="passwordInput">密碼</label>
						<input id="passwordInput" type="password" placeholder="至少 4 碼">
					</div>
				</div>
				<div class="actions">
					<button class="secondary" id="registerBtn" type="button">註冊</button>
					<button class="primary" id="loginBtn" type="button">登入</button>
				</div>
				<button class="ghost" id="clearBtn" type="button">清除本機登入</button>
			</div>

			<div class="sheet" style="margin-top:16px">
				<h2>家庭</h2>
				<div class="form-grid">
					<div class="field">
						<label for="familyNameInput">家庭名稱</label>
						<input id="familyNameInput" type="text" placeholder="例如：王家">
					</div>
					<div class="field">
						<label for="memberEmailInput">家人 Email</label>
						<input id="memberEmailInput" type="email" placeholder="家人帳號 email">
					</div>
				</div>
				<div class="actions">
					<button class="secondary" id="createFamilyBtn" type="button">建立家庭</button>
					<button class="ghost" id="addMemberBtn" type="button">加入家人</button>
				</div>
			</div>
		</section>

		<nav class="nav" aria-label="主要導覽">
			<button class="active" data-view="homeView" type="button">清單</button>
			<button data-view="voiceView" type="button">語音</button>
			<button data-view="accountView" type="button">帳號</button>
		</nav>
	</main>

	<script>
		const state = {
			apiBaseUrl: localStorage.getItem('apiBaseUrl') || window.location.origin,
			token: localStorage.getItem('token') || '',
			email: localStorage.getItem('email') || '',
			familyName: localStorage.getItem('familyName') || '',
			activeList: localStorage.getItem('activeList') || 'personal',
			items: { personal: [], family: [] },
		};

		const el = (id) => document.getElementById(id);
		const statusBox = el('statusBox');

		function setStatus(message, tone = '') {
			statusBox.className = 'message' + (tone ? ' ' + tone : '');
			statusBox.textContent = message;
		}

		function cleanNameAndQty(value) {
			const text = value.trim();
			const match = text.match(/(.+?)(?:\s*(\d+)\s*(?:個|瓶|包|盒|袋)?)?$/);
			return { name: (match && match[1] ? match[1] : text).trim(), qty: Number(match && match[2] ? match[2] : 1) };
		}

		function headers(hasBody = false) {
			const output = {};
			if (hasBody) output['Content-Type'] = 'application/json';
			if (state.token) output.Authorization = 'Bearer ' + state.token;
			return output;
		}

		async function request(path, options = {}) {
			const response = await fetch(state.apiBaseUrl + path, options);
			const text = await response.text();
			const data = text ? JSON.parse(text) : {};
			if (!response.ok) throw new Error(data.detail || 'HTTP ' + response.status);
			return data;
		}

		function updateChrome() {
			el('authChip').textContent = state.token ? '已登入 ' + state.email : '未登入';
			el('familyChip').textContent = state.familyName ? state.familyName : '未加入家庭';
			el('apiChip').textContent = new URL(state.apiBaseUrl).host;
			el('personalTab').classList.toggle('active', state.activeList === 'personal');
			el('familyTab').classList.toggle('active', state.activeList === 'family');
			el('listTitle').textContent = state.activeList === 'personal' ? '個人清單' : '家用清單';
			el('listTypeInput').value = state.activeList;
		}

		function renderList() {
			updateChrome();
			const target = el('currentList');
			const rows = state.items[state.activeList] || [];
			if (!state.token) {
				target.className = 'empty';
				target.textContent = '請到帳號頁登入。';
				return;
			}
			if (!rows.length) {
				target.className = 'empty';
				target.textContent = state.activeList === 'personal' ? '個人清單目前是空的。' : '家用清單目前是空的。';
				return;
			}
			target.className = '';
			target.innerHTML = rows.map((item) => `
				<div class="item">
					<div><strong>${escapeHtml(item.name)}</strong><span>數量 ${item.qty_needed}</span></div>
					<span>#${item.id}</span>
				</div>
			`).join('');
		}

		function escapeHtml(value) {
			return String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
		}

		async function refreshItems() {
			if (!state.token) {
				renderList();
				setStatus('請先登入，之後可新增個人與家用清單。');
				return;
			}
			try {
				const data = await request('/items/me', { headers: headers() });
				state.items = { personal: data.personal || [], family: data.family || [] };
				renderList();
				setStatus('清單已更新。', 'ok');
			} catch (error) {
				setStatus('讀取失敗：' + error.message, 'error');
			}
		}

		async function register() {
			try {
				const data = await request('/auth/register', {
					method: 'POST',
					headers: headers(true),
					body: JSON.stringify({ name: el('nameInput').value.trim(), email: el('emailInput').value.trim(), password: el('passwordInput').value }),
				});
				setStatus('註冊成功，user_id = ' + data.user_id + '。', 'ok');
			} catch (error) {
				setStatus('註冊失敗：' + error.message, 'error');
			}
		}

		async function login() {
			try {
				const email = el('emailInput').value.trim();
				const data = await request('/auth/login', {
					method: 'POST',
					headers: headers(true),
					body: JSON.stringify({ email, password: el('passwordInput').value }),
				});
				state.token = data.token;
				state.email = email;
				localStorage.setItem('token', state.token);
				localStorage.setItem('email', state.email);
				await refreshItems();
			} catch (error) {
				setStatus('登入失敗：' + error.message, 'error');
			}
		}

		async function addItem() {
			if (!state.token) return setStatus('請先登入。');
			const parsed = cleanNameAndQty(el('itemNameInput').value);
			if (!parsed.name) return setStatus('請輸入品項。');
			try {
				await request('/items', {
					method: 'POST',
					headers: headers(true),
					body: JSON.stringify({ name: parsed.name, qty_needed: parsed.qty, list_type: state.activeList }),
				});
				el('itemNameInput').value = '';
				await refreshItems();
			} catch (error) {
				setStatus('新增失敗：' + error.message, 'error');
			}
		}

		async function buyItem() {
			if (!state.token) return setStatus('請先登入。');
			const parsed = cleanNameAndQty(el('itemNameInput').value);
			if (!parsed.name) return setStatus('請輸入要扣除的品項。');
			try {
				await request('/purchase', {
					method: 'POST',
					headers: headers(true),
					body: JSON.stringify({ item_name: parsed.name, for_list_type: state.activeList }),
				});
				await refreshItems();
			} catch (error) {
				setStatus('購買失敗：' + error.message, 'error');
			}
		}

		async function voiceAdd() {
			if (!state.token) return setStatus('請先登入。');
			const phrase = el('voiceInput').value.trim();
			if (!phrase) return setStatus('請輸入語音內容。');
			try {
				await request('/voice/siri', {
					method: 'POST',
					headers: headers(true),
					body: JSON.stringify({ phrase, list_type: state.activeList }),
				});
				el('voiceInput').value = '';
				await refreshItems();
			} catch (error) {
				setStatus('語音加入失敗：' + error.message, 'error');
			}
		}

		async function createFamily() {
			if (!state.token) return setStatus('請先登入。');
			try {
				const data = await request('/family/create', {
					method: 'POST',
					headers: headers(true),
					body: JSON.stringify({ name: el('familyNameInput').value.trim() }),
				});
				state.familyName = data.name;
				localStorage.setItem('familyName', state.familyName);
				updateChrome();
				setStatus('家庭已建立：' + data.name, 'ok');
			} catch (error) {
				setStatus('建立家庭失敗：' + error.message, 'error');
			}
		}

		async function addMember() {
			if (!state.token) return setStatus('請先登入。');
			try {
				await request('/family/add-member', {
					method: 'POST',
					headers: headers(true),
					body: JSON.stringify({ member_email: el('memberEmailInput').value.trim() }),
				});
				setStatus('已加入家人。', 'ok');
			} catch (error) {
				setStatus('加入家人失敗：' + error.message, 'error');
			}
		}

		async function socialLogin(provider) {
			try {
				const data = await request('/auth/oauth/' + provider + '/start');
				window.location.href = data.authorization_url;
			} catch (error) {
				setStatus(provider + ' 登入尚未啟用：請先在 Render 設定對應 OAuth client id 與 redirect uri。', 'error');
			}
		}

		function clearAuth() {
			state.token = '';
			state.email = '';
			state.familyName = '';
			localStorage.removeItem('token');
			localStorage.removeItem('email');
			localStorage.removeItem('familyName');
			state.items = { personal: [], family: [] };
			renderList();
			setStatus('已清除本機登入。', 'ok');
		}

		document.querySelectorAll('[data-view]').forEach((button) => {
			button.addEventListener('click', () => {
				document.querySelectorAll('[data-view]').forEach((nav) => nav.classList.toggle('active', nav === button));
				document.querySelectorAll('.view').forEach((view) => view.classList.toggle('active', view.id === button.dataset.view));
			});
		});
		document.querySelectorAll('[data-provider]').forEach((button) => button.addEventListener('click', () => socialLogin(button.dataset.provider)));

		el('personalTab').addEventListener('click', () => { state.activeList = 'personal'; localStorage.setItem('activeList', state.activeList); renderList(); });
		el('familyTab').addEventListener('click', () => { state.activeList = 'family'; localStorage.setItem('activeList', state.activeList); renderList(); });
		el('listTypeInput').addEventListener('change', () => { state.activeList = el('listTypeInput').value; localStorage.setItem('activeList', state.activeList); renderList(); });
		el('refreshBtn').addEventListener('click', refreshItems);
		el('quickAddBtn').addEventListener('click', addItem);
		el('buyBtn').addEventListener('click', buyItem);
		el('voiceBtn').addEventListener('click', voiceAdd);
		el('registerBtn').addEventListener('click', register);
		el('loginBtn').addEventListener('click', login);
		el('clearBtn').addEventListener('click', clearAuth);
		el('createFamilyBtn').addEventListener('click', createFamily);
		el('addMemberBtn').addEventListener('click', addMember);

		updateChrome();
		refreshItems();
	</script>
</body>
</html>
